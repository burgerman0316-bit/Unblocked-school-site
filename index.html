<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaneland Application Launcher</title>
    <link rel="icon" href="https://ssl.gstatic.com/images/branding/product/1x/drive_2020q4_32dp.png">
    
    <style>
        :root {
            --google-gray: #5f6368;
            --google-blue: #1a73e8;
            --bg-color: #ffffff;
            --card-hover: #f1f3f4;
        }

        body {
            font-family: 'Product Sans', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: #202124;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Top Navigation Bar */
        header {
            width: 100%;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #dadce0;
            box-sizing: border-box;
        }

        .logo {
            font-size: 22px;
            color: var(--google-gray);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo img {
            height: 24px;
        }

        /* Hero / Title Section */
        .hero {
            text-align: center;
            margin-top: 50px;
            margin-bottom: 30px;
        }

        .hero h1 {
            font-weight: 400;
            font-size: 2.5rem;
            margin: 0;
        }

        /* App Grid */
        .launcher-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 1000px;
            padding: 20px;
        }

        /* Individual App Card */
        .app-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: inherit;
            padding: 20px;
            border-radius: 12px;
            transition: background 0.2s;
            border: 1px solid transparent;
        }

        .app-item:hover {
            background-color: var(--card-hover);
            border: 1px solid #dadce0;
        }

        .app-icon {
            width: 64px;
            height: 64px;
            margin-bottom: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            background: #f8f9fa;
            border-radius: 16px;
        }

        .app-name {
            font-size: 14px;
            font-weight: 500;
            text-align: center;
        }

        /* Search Bar */
        .search-wrapper {
            width: 100%;
            max-width: 580px;
            margin-bottom: 40px;
        }

        #search {
            width: 100%;
            padding: 12px 20px;
            border-radius: 24px;
            border: 1px solid #dadce0;
            font-size: 16px;
            outline: none;
            transition: box-shadow 0.2s;
        }

        #search:focus {
            box-shadow: 0 1px 6px rgba(32,33,36,0.28);
        }

        /* Panic Button Style */
        .panic-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #d93025;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }

        @media (max-width: 600px) {
            .hero h1 { font-size: 1.8rem; }
            .launcher-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">
            <img src="https://www.gstatic.com/images/branding/product/1x/drive_2020q4_32dp.png" alt="Logo">
            Kaneland Launcher
        </div>
    </header>

    <div class="hero">
        <h1>Application Launcher</h1>
        <p>Select an app to continue</p>
    </div>

    <div class="search-wrapper">
        <input type="text" id="search" placeholder="Search apps..." onkeyup="filterApps()">
    </div>

    <main class="launcher-grid" id="grid">
        
        <a href="LINK_TO_GAME_HERE" class="app-item">
            <div class="app-icon">🎈</div>
            <div class="app-name">Bloons TD 5</div>
        </a>

        <a href="LINK_TO_GAME_HERE" class="app-item">
            <div class="app-icon">🚗</div>
            <div class="app-name">GTA 1</div>
        </a>

        <a href="https://kaneland.instructure.com/" class="app-item">
            <div class="app-icon">🎨</div>
            <div class="app-name">Canvas</div>
        </a>

        <a href="https://kanelandil.infinitecampus.org/campus/portal/kaneland.jsp" class="app-item">
            <div class="app-icon">🏫</div>
            <div class="app-name">Infinite Campus</div>
        </a>

        <a href="https://drive.google.com" class="app-item">
            <div class="app-icon">📂</div>
            <div class="app-name">Google Drive</div>
        </a>

    </main>

    <button class="panic-btn" onclick="panic()">PANIC (ESC)</button>

    <script>
        // Filter function for search bar
        function filterApps() {
            let input = document.getElementById('search').value.toLowerCase();
            let items = document.getElementsByClassName('app-item');
            
            for (let i = 0; i < items.length; i++) {
                let name = items[i].querySelector('.app-name').innerText.toLowerCase();
                items[i].style.display = name.includes(input) ? "flex" : "none";
            }
        }

        // Panic Function
        function panic() {
            window.location.replace("https://kaneland.instructure.com/");
        }

        // Panic Keybind (Escape)
        document.addEventListener('keydown', (e) => {
            if (e.key === "Escape") panic();
        });
    </script>
</body>
</html>
